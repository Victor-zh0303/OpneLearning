<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>学习笔记汇总</title>
<style>
  /* 全局样式 */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  
  :root {
    --primary-500: #6366f1;
    --primary-600: #4f46e5;
    --primary-100: #e0e7ff;
    --accent-cyan: #06b6d4;
    --accent-pink: #ec4899;
    --gray-50: #f8fafc;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-700: #334155;
    --gray-900: #0f172a;
    --gradient-primary: linear-gradient(135deg, var(--primary-500) 0%, var(--accent-cyan) 100%);
    --gradient-card: linear-gradient(135deg, white 0%, var(--primary-100) 100%);
    --shadow-md: 0 4px 6px -1px rgba(99, 102, 241, 0.1);
    --shadow-hover: 0 10px 15px -3px rgba(99, 102, 241, 0.15);
    --radius-lg: 12px;
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  body {
    min-height: 100vh;
    background-color: var(--gray-50);
    background-image: radial-gradient(var(--primary-100) 1px, transparent 1px);
    background-size: 20px 20px;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* 标题样式 */
  .page-title {
    font-size: 2rem;
    font-weight: 700;
    color: var(--gray-900);
    background: var(--gradient-primary);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 3rem;
    text-align: center;
    letter-spacing: -0.02em;
  }

  /* 主题卡片容器 */
  .notes-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 2rem;
    width: 100%;
    max-width: 1200px;
  }

  /* 主题卡片样式 */
  .note-card {
    background: var(--gradient-card);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-md);
    padding: 2rem;
    transition: var(--transition);
    cursor: pointer;
    border: 1px solid var(--gray-200);
    text-decoration: none;
    color: inherit;
  }

  .note-card:hover {
    transform: translateY(-5px);
    box-shadow: var(--shadow-hover);
    border-color: var(--primary-500);
  }

  .card-icon {
    width: 48px;
    height: 48px;
    background: var(--gradient-primary);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 1rem;
  }

  .card-icon i {
    font-size: 24px;
    color: white;
  }

  .card-title {
    font-size: 1.25rem;
    font-weight: 600;
    color: var(--gray-900);
    margin-bottom: 0.5rem;
  }

  .card-desc {
    color: var(--gray-700);
    line-height: 1.5;
  }

  /* 响应式适配 */
  @media (max-width: 768px) {
    body {
      padding: 1rem;
    }

    .page-title {
      font-size: 1.5rem;
      margin-bottom: 2rem;
    }

    .notes-container {
      gap: 1.5rem;
    }

    .note-card {
      padding: 1.5rem;
    }
  }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body>
  <h1 class="page-title">我的学习笔记汇总</h1>

  <div class="notes-container">
    <!-- LangChain 主题卡片 -->
    <a href="langchain/index.html" class="note-card">
      <div class="card-icon">
        <i class="bi bi-book-half"></i>
      </div>
      <h2 class="card-title">LangChain 学习笔记</h2>
      <p class="card-desc">包含 Model、Chains、Memory、Tools、Agents、Retrieval 等核心模块学习笔记</p>
    </a>

    <!-- Claude Code 主题卡片（示例） -->
    <a href="claude-code/index.html" class="note-card">
      <div class="card-icon">
        <i class="bi bi-code-slash"></i>
      </div>
      <h2 class="card-title">Claude Code 学习笔记</h2>
      <p class="card-desc">Claude Code 快速入门、核心功能、实战案例等学习内容</p>
    </a>

    <!-- OpenClaw 主题卡片（示例） -->
    <a href="openclaw/index.html" class="note-card">
      <div class="card-icon">
        <i class="bi bi-robot"></i>
      </div>
      <h2 class="card-title">OpenClaw 学习笔记</h2>
      <p class="card-desc">OpenClaw 环境搭建、基础使用、高级特性等学习内容</p>
    </a>

    <!-- 新增主题只需复制上面的卡片，修改 href 和内容即可 -->
    <!-- 
    <a href="新主题文件夹/index.html" class="note-card">
      <div class="card-icon">
        <i class="bi bi-xxx"></i>
      </div>
      <h2 class="card-title">新主题名称</h2>
      <p class="card-desc">新主题描述</p>
    </a>
    -->
  </div>
</body>
</html>
